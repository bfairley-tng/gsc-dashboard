<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GSC Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#05070d;color:#e2e8f0;font-family:'DM Sans','Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1a2035;border-radius:4px}

/* layout */
#header{position:sticky;top:0;z-index:100;background:rgba(5,7,13,0.97);border-bottom:1px solid rgba(255,255,255,0.05);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px)}
#body{padding:22px 24px 60px}

/* google logo badge */
.g-badge{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#4285F4,#34A853 50%,#EA4335);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:white;flex-shrink:0}

/* domain tabs */
.dtab{border-radius:8px;padding:5px 13px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;font-family:inherit}
.dtab.active{font-weight:700}

/* status pill */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;border-radius:20px;padding:3px 9px}
.dot{width:5px;height:5px;border-radius:50%;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.pulsing{animation:pulse 1s infinite}

/* sync button */
.sync-btn{border-radius:7px;padding:5px 13px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.sync-btn:disabled{opacity:.4;cursor:not-allowed}

/* kpi grid */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.kpi-card{background:linear-gradient(145deg,rgba(12,16,28,.95),rgba(16,22,40,.95));border-radius:14px;padding:16px 18px;position:relative;overflow:hidden}
.kpi-card::after{content:'';position:absolute;top:-24px;right:-24px;width:90px;height:90px;border-radius:50%;pointer-events:none}
.kpi-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:#4a5568;margin-bottom:8px}
.kpi-value{font-size:22px;font-weight:800;font-family:'Space Mono',monospace;line-height:1;margin-bottom:2px}
.kpi-sub{font-size:10px;color:#4a5568;margin-top:3px}
.kpi-delta{display:inline-flex;align-items:center;gap:3px;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:700;margin-top:6px}
.delta-up{color:#68d391;background:rgba(104,211,145,.08);border:1px solid rgba(104,211,145,.2)}
.delta-dn{color:#fc8181;background:rgba(252,129,129,.08);border:1px solid rgba(252,129,129,.2)}

/* cards */
.card{border-radius:14px;padding:18px 20px;box-shadow:0 2px 20px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.03)}
.card-title{font-weight:700;font-size:12px;color:#a0aec0;margin-bottom:4px}
.card-note{font-size:10px;color:#4a5568;line-height:1.5;margin-bottom:10px}

/* two-col, three-col grids */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* chart canvas wrapper */
.chart-wrap{position:relative;width:100%}

/* mini bar */
.mini-bar-row{margin-bottom:13px}
.mini-bar-label{display:flex;justify-content:space-between;margin-bottom:3px}
.mini-bar-text{font-size:11px;color:#a0aec0;font-weight:500;max-width:70%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-bar-val{font-size:11px;font-family:'Space Mono',monospace;font-weight:700}
.mini-bar-track{height:3px;border-radius:2px;background:rgba(255,255,255,.05)}
.mini-bar-fill{height:100%;border-radius:2px}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(6px)}
.modal-box{background:rgba(12,16,28,.98);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:32px;max-width:440px;width:90%;box-shadow:0 24px 80px rgba(0,0,0,.8)}
.modal-box ol{padding-left:18px;color:#a0aec0;font-size:12px;line-height:2}
.modal-box a{color:#63b3ed}
.google-btn{width:100%;background:white;color:#1a202c;border:none;border-radius:10px;padding:11px 0;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.4);cursor:pointer;font-family:inherit;margin-top:20px}

/* domain title */
.domain-title{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.domain-title h1{font-size:20px;font-weight:800;letter-spacing:-.04em;color:#e2e8f0}
.domain-title p{font-size:11px;color:#374151;margin-top:1px}

/* header left */
.header-left{display:flex;align-items:center;gap:10px}
.header-right{display:flex;align-items:center;gap:8px}
.hd-title{font-weight:800;font-size:14px;color:#e2e8f0;letter-spacing:-.03em}
.hd-sub{font-size:9px;color:#374151;letter-spacing:.06em;text-transform:uppercase;margin-top:1px}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease forwards}
</style>
</head>
<body>

<!-- ── Header ───────────────────────────────────────────────────────────── -->
<div id="header">
  <div class="header-left">
    <div class="g-badge">G</div>
    <div>
      <div class="hd-title">Search Console</div>
      <div class="hd-sub" id="sync-label">Cached data · connect Gmail to refresh</div>
    </div>
  </div>
  <div class="header-right" id="header-right"></div>
</div>

<!-- ── Body ─────────────────────────────────────────────────────────────── -->
<div id="body"></div>

<!-- ── Modal ────────────────────────────────────────────────────────────── -->
<div class="modal-bg" id="modal" style="display:none">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="g-badge">G</div>
        <span style="font-weight:800;font-size:15px;color:#e2e8f0">Connect Gmail</span>
      </div>
      <button onclick="closeModal()" style="color:#4a5568;font-size:22px;cursor:pointer;background:none;border:none;line-height:1">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════════════════
var GOOGLE_CLIENT_ID = "YOUR_CLIENT_ID.apps.googleusercontent.com";
var GMAIL_SCOPE      = "https://www.googleapis.com/auth/gmail.readonly";

// ════════════════════════════════════════════════════════════════════════
// Pre-loaded data (always shown; Gmail sync adds to this)
// ════════════════════════════════════════════════════════════════════════

    {month:"February",shortLabel:"Feb '26",clicks:2580,impressions:78100,pages:578,ctr:3.30,desktop:1320,mobile:1170,tablet:91,

    {month:"November",shortLabel:"Nov '25",clicks:56,impressions:1650,pages:9,ctr:3.39,desktop:20,mobile:36,tablet:0,
     topQueries:[{q:"narrative group",c:7},{q:"technology narrative group",c:5},{q:"the narrative group",c:3}],
     topCountries:[{co:"Canada",c:51},{co:"United States",c:3},{co:"Germany",c:1}]},
    {month:"January",shortLabel:"Jan '26",clicks:51,impressions:4070,pages:3,ctr:1.25,desktop:30,mobile:21,tablet:0,
     topQueries:[{q:"the narrative group",c:6},{q:"narrative group",c:5},{q:"managed it services oakville",c:1}],

};

// ════════════════════════════════════════════════════════════════════════
// State
// ════════════════════════════════════════════════════════════════════════
var state = {
  data:     JSON.parse(JSON.stringify(PRELOADED)),
  domain:   "opimian.ca",
  loading:  false,
  status:   "cached",
  lastSync: null,
  token:    null
};

var PAL = {
  "opimian.ca":          {p:"#63b3ed",s:"#9f7aea",bar:"#f6ad55",ctr:"#68d391",flag:"🍷"},
  "narrative-group.com": {p:"#f687b3",s:"#76e4f7",bar:"#fbd38d",ctr:"#9f7aea",flag:"💼"}
};
function pal(d){ return PAL[d] || {p:"#63b3ed",s:"#9f7aea",bar:"#f6ad55",ctr:"#68d391",flag:"🌐"}; }

// ════════════════════════════════════════════════════════════════════════
// Canvas chart helpers
// ════════════════════════════════════════════════════════════════════════
function hex2rgb(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function drawLineChart(canvas, series, color, formatter){
  var ctx=canvas.getContext("2d");
  var W=canvas.width, H=canvas.height;
  var pad={top:10,right:10,bottom:28,left:42};
  ctx.clearRect(0,0,W,H);

  var vals=series.map(function(s){return s.v;});
  var labels=series.map(function(s){return s.label;});
  var min=0, max=Math.max.apply(null,vals)*1.15||1;
  var rgb=hex2rgb(color);

  var chartW=W-pad.left-pad.right;
  var chartH=H-pad.top-pad.bottom;

  // gradient fill
  var grad=ctx.createLinearGradient(0,pad.top,0,pad.top+chartH);
  grad.addColorStop(0,"rgba("+rgb.r+","+rgb.g+","+rgb.b+",.22)");
  grad.addColorStop(1,"rgba("+rgb.r+","+rgb.g+","+rgb.b+",.01)");

  // grid lines
  ctx.strokeStyle="rgba(255,255,255,.04)";
  ctx.lineWidth=1;
  for(var i=0;i<=4;i++){
    var y=pad.top+chartH*(1-i/4);
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+chartW,y);ctx.stroke();
    var label=formatter?formatter(min+(max-min)*i/4):Math.round(min+(max-min)*i/4);
    ctx.fillStyle="#4a5568";ctx.font="10px 'DM Sans',sans-serif";ctx.textAlign="right";
    ctx.fillText(label,pad.left-6,y+3);
  }

  function xPos(i){ return pad.left+i/(series.length-1||1)*chartW; }
  function yPos(v){ return pad.top+chartH*(1-(v-min)/(max-min)); }

  // filled area
  ctx.beginPath();
  ctx.moveTo(xPos(0),yPos(vals[0]));
  for(var i=1;i<vals.length;i++) ctx.lineTo(xPos(i),yPos(vals[i]));
  ctx.lineTo(xPos(vals.length-1),pad.top+chartH);
  ctx.lineTo(xPos(0),pad.top+chartH);
  ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();

  // line
  ctx.beginPath();
  ctx.moveTo(xPos(0),yPos(vals[0]));
  for(var i=1;i<vals.length;i++) ctx.lineTo(xPos(i),yPos(vals[i]));
  ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin="round";ctx.stroke();

  // dots
  for(var i=0;i<vals.length;i++){
    ctx.beginPath();ctx.arc(xPos(i),yPos(vals[i]),4,0,Math.PI*2);
    ctx.fillStyle=color;ctx.fill();
  }

  // x labels
  ctx.fillStyle="#4a5568";ctx.font="11px 'DM Sans',sans-serif";ctx.textAlign="center";
  for(var i=0;i<labels.length;i++) ctx.fillText(labels[i],xPos(i),H-8);
}

function drawGroupedBar(canvas, series, colors){
  // series = [{label, values:[v1,v2,v3]}, ...]
  var ctx=canvas.getContext("2d");
  var W=canvas.width, H=canvas.height;
  var pad={top:10,right:10,bottom:28,left:36};
  ctx.clearRect(0,0,W,H);

  var allVals=[];
  series.forEach(function(s){ s.values.forEach(function(v){ allVals.push(v); }); });
  var max=Math.max.apply(null,allVals)*1.15||1;
  var chartW=W-pad.left-pad.right;
  var chartH=H-pad.top-pad.bottom;
  var nGroups=series.length;
  var nBars=colors.length;
  var groupW=chartW/nGroups;
  var barW=Math.min(groupW/(nBars+1)*0.9,18);

  // grid
  ctx.strokeStyle="rgba(255,255,255,.04)";ctx.lineWidth=1;
  for(var i=0;i<=4;i++){
    var y=pad.top+chartH*(1-i/4);
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+chartW,y);ctx.stroke();
    ctx.fillStyle="#4a5568";ctx.font="10px 'DM Sans',sans-serif";ctx.textAlign="right";
    ctx.fillText(Math.round(max*i/4),pad.left-4,y+3);
  }

  series.forEach(function(s,gi){
    var gx=pad.left+gi*groupW+groupW/2;
    s.values.forEach(function(v,bi){
      var x=gx+(bi-(nBars-1)/2)*(barW+2);
      var bh=(v/max)*chartH;
      var y=pad.top+chartH-bh;
      var r=hex2rgb(colors[bi]);
      var grad=ctx.createLinearGradient(0,y,0,y+bh);
      grad.addColorStop(0,"rgba("+r.r+","+r.g+","+r.b+",.9)");
      grad.addColorStop(1,"rgba("+r.r+","+r.g+","+r.b+",.6)");
      ctx.beginPath();
      ctx.roundRect(x-barW/2,y,barW,bh,[3,3,0,0]);
      ctx.fillStyle=grad;ctx.fill();
    });
    ctx.fillStyle="#4a5568";ctx.font="10px 'DM Sans',sans-serif";ctx.textAlign="center";
    ctx.fillText(s.label,gx,H-8);
  });
}

function drawComboChart(canvas, months, lineColor, barColor){
  var ctx=canvas.getContext("2d");
  var W=canvas.width, H=canvas.height;
  var pad={top:10,right:52,bottom:28,left:52};
  ctx.clearRect(0,0,W,H);

  var lineVals=months.map(function(m){return m.impressions;});
  var barVals=months.map(function(m){return m.pages;});
  var labels=months.map(function(m){return m.shortLabel;});
  var lineMax=Math.max.apply(null,lineVals)*1.15||1;
  var barMax=Math.max.apply(null,barVals)*1.15||1;

  var chartW=W-pad.left-pad.right;
  var chartH=H-pad.top-pad.bottom;
  var n=months.length;
  function xPos(i){ return pad.left+i/(n-1||1)*chartW; }
  function lyPos(v){ return pad.top+chartH*(1-v/lineMax); }
  function ryPos(v){ return pad.top+chartH*(1-v/barMax); }

  // grid
  ctx.strokeStyle="rgba(255,255,255,.04)";ctx.lineWidth=1;
  for(var i=0;i<=4;i++){
    var y=pad.top+chartH*(1-i/4);
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+chartW,y);ctx.stroke();
  }

  // left axis (impressions)
  ctx.fillStyle=lineColor;ctx.font="10px 'DM Sans',sans-serif";ctx.textAlign="right";
  for(var i=0;i<=4;i++){
    var y=pad.top+chartH*(1-i/4);
    var v=lineMax*i/4;
    ctx.fillText(v>=1000?(v/1000).toFixed(0)+"K":Math.round(v),pad.left-4,y+3);
  }

  // right axis (pages)
  ctx.fillStyle=barColor;ctx.textAlign="left";
  for(var i=0;i<=4;i++){
    var y=pad.top+chartH*(1-i/4);
    ctx.fillText(Math.round(barMax*i/4),pad.left+chartW+4,y+3);
  }

  // bars (est new impressions)
  var barW=Math.min(chartW/n*0.5,40);
  barVals.forEach(function(v,i){
    var bh=(v/barMax)*chartH;
    var x=xPos(i);
    var r=hex2rgb(barColor);
    ctx.beginPath();
    ctx.roundRect(x-barW/2,ryPos(v),barW,bh,[4,4,0,0]);
    ctx.fillStyle="rgba("+r.r+","+r.g+","+r.b+",.82)";ctx.fill();
  });

  // area fill
  var rgb=hex2rgb(lineColor);
  var grad=ctx.createLinearGradient(0,pad.top,0,pad.top+chartH);
  grad.addColorStop(0,"rgba("+rgb.r+","+rgb.g+","+rgb.b+",.25)");
  grad.addColorStop(1,"rgba("+rgb.r+","+rgb.g+","+rgb.b+",.01)");
  ctx.beginPath();
  ctx.moveTo(xPos(0),lyPos(lineVals[0]));
  for(var i=1;i<n;i++) ctx.lineTo(xPos(i),lyPos(lineVals[i]));
  ctx.lineTo(xPos(n-1),pad.top+chartH);ctx.lineTo(xPos(0),pad.top+chartH);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();

  // line
  ctx.beginPath();
  ctx.moveTo(xPos(0),lyPos(lineVals[0]));
  for(var i=1;i<n;i++) ctx.lineTo(xPos(i),lyPos(lineVals[i]));
  ctx.strokeStyle=lineColor;ctx.lineWidth=2.5;ctx.lineJoin="round";ctx.stroke();
  for(var i=0;i<n;i++){
    ctx.beginPath();ctx.arc(xPos(i),lyPos(lineVals[i]),4,0,Math.PI*2);
    ctx.fillStyle=lineColor;ctx.fill();
  }

  // x labels
  ctx.fillStyle="#4a5568";ctx.font="11px 'DM Sans',sans-serif";ctx.textAlign="center";
  labels.forEach(function(l,i){ ctx.fillText(l,xPos(i),H-8); });
}

// ════════════════════════════════════════════════════════════════════════
// Render
// ════════════════════════════════════════════════════════════════════════
function fmtNum(n){ return n>=1000?(n/1000).toFixed(1)+"K":n; }

function delta(months, key){
  var n=months.length;
  if(n<2) return null;
  var curr=months[n-1][key], prev=months[n-2][key];
  if(!prev) return null;
  return ((curr-prev)/prev)*100;
}

function renderHeader(){
  var domains=Object.keys(state.data);
  var p=pal(state.domain);
  var hr=document.getElementById("header-right");
  hr.innerHTML="";

  // domain tabs
  domains.forEach(function(d){
    var p2=pal(d);
    var active=d===state.domain;
    var btn=document.createElement("button");
    btn.className="dtab"+(active?" active":"");
    btn.style.background=active?p2.p+"18":"transparent";
    btn.style.border="1px solid "+(active?p2.p+"55":"rgba(255,255,255,.07)");
    btn.style.color=active?p2.p:"#4a5568";
    btn.innerHTML='<span style="font-size:11px">'+p2.flag+'</span> '+d;
    btn.onclick=function(){ state.domain=d; render(); };
    hr.appendChild(btn);
  });

  // status pill
  var pill=document.createElement("div");
  pill.className="pill";
  var isLoading=state.loading;
  pill.style.color=isLoading?"#f6ad55":"#68d391";
  pill.style.background=isLoading?"rgba(246,173,85,.08)":"rgba(104,211,145,.08)";
  pill.style.border="1px solid "+(isLoading?"rgba(246,173,85,.2)":"rgba(104,211,145,.2)");
  var dot=document.createElement("span");
  dot.className="dot"+(isLoading?" pulsing":"");
  dot.style.background=isLoading?"#f6ad55":"#68d391";
  pill.appendChild(dot);
  pill.appendChild(document.createTextNode(isLoading?"Syncing…":state.status==="live"?"Live · Gmail synced":"Cached data"));
  hr.appendChild(pill);

  // sync button
  var syncBtn=document.createElement("button");
  syncBtn.className="sync-btn";
  syncBtn.style.background="rgba(99,179,237,.1)";
  syncBtn.style.border="1px solid rgba(99,179,237,.25)";
  syncBtn.style.color="#63b3ed";
  syncBtn.textContent=state.lastSync?"↻ Sync":"↻ Connect Gmail";
  syncBtn.disabled=state.loading;
  syncBtn.onclick=openModal;
  hr.appendChild(syncBtn);

  // sync label
  var lbl=document.getElementById("sync-label");
  lbl.textContent=state.lastSync?"Synced "+state.lastSync.toLocaleTimeString():"Cached data · connect Gmail to refresh";
}

function renderKPIs(container, months){
  var p=pal(state.domain);
  var latest=months[months.length-1];
  var prev=months[months.length-2];
  var totalDev=latest.mobile+latest.desktop+latest.tablet||1;
  var mobShare=Math.round(latest.mobile/totalDev*100);
  var niShare=latest.impressions>0?((latest.pages/latest.impressions)*100).toFixed(1):0;

  var kpis=[
    {label:"Clicks",       value:latest.clicks.toLocaleString(),    sub:latest.month,         color:p.p,   icon:"🖱️",  key:"clicks"},
    {label:"Total Impr.",  value:fmtNum(latest.impressions),        sub:"times shown",         color:p.s,   icon:"👁️",  key:"impressions"},
    {label:"Est. New Impr.",value:latest.pages.toLocaleString(),    sub:niShare+"% of total",  color:p.bar, icon:"✨",  key:"pages"},
    {label:"CTR",          value:latest.ctr.toFixed(2)+"%",         sub:"click-through rate",  color:p.ctr, icon:"%",   key:"ctr"},
    {label:"Mobile Share", value:mobShare+"%",                      sub:"of device clicks",    color:"#fc8181",icon:"📱",key:null},
  ];

  var grid=document.createElement("div");
  grid.className="kpi-grid";

  kpis.forEach(function(k){
    var d=k.key&&months.length>=2?delta(months,k.key):null;
    var card=document.createElement("div");
    card.className="kpi-card";
    card.style.border="1px solid "+k.color+"25";
    card.style.boxShadow="0 4px 32px "+k.color+"10";
    card.innerHTML='<div style="position:absolute;top:-24px;right:-24px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,'+k.color+'15 0%,transparent 70%);pointer-events:none"></div>'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
        '<div class="kpi-label">'+k.label+'</div>'+
        '<span style="font-size:14px;opacity:.45">'+k.icon+'</span>'+
      '</div>'+
      '<div class="kpi-value" style="color:'+k.color+'">'+k.value+'</div>'+
      '<div class="kpi-sub">'+k.sub+'</div>'+
      (d!==null?'<div class="kpi-delta '+(d>=0?"delta-up":"delta-dn")+'">'+(d>=0?"↑":"↓")+' '+Math.abs(d).toFixed(1)+'%</div>':"");
    grid.appendChild(card);
  });
  container.appendChild(grid);
}

function makeCard(accentColor){
  var c=document.createElement("div");
  c.className="card";
  c.style.background="rgba(11,14,26,.92)";
  c.style.border="1px solid "+accentColor+"18";
  return c;
}

function makeCanvas(w,h){
  var canvas=document.createElement("canvas");
  // Use devicePixelRatio for sharp rendering
  var dpr=window.devicePixelRatio||1;
  canvas.width=w*dpr; canvas.height=h*dpr;
  canvas.style.width=w+"px"; canvas.style.height=h+"px";
  canvas.getContext("2d").scale(dpr,dpr);
  return canvas;
}

function renderDomain(){
  var body=document.getElementById("body");
  body.innerHTML="";
  var p=pal(state.domain);
  var months=state.data[state.domain]||[];
  if(!months.length){
    body.innerHTML='<p style="text-align:center;padding:80px 0;color:#374151">No data for '+state.domain+'</p>';
    return;
  }

  var wrap=document.createElement("div");
  wrap.className="fade-up";

  // Domain title
  var titleRow=document.createElement("div");
  titleRow.className="domain-title";
  titleRow.innerHTML='<span style="font-size:22px">'+p.flag+'</span><div><h1>'+state.domain+'</h1><p>'+months.length+' month'+(months.length!==1?"s":"")+" · "+months[0].shortLabel+" → "+months[months.length-1].shortLabel+'</p></div>';
  wrap.appendChild(titleRow);

  // KPIs
  renderKPIs(wrap, months);

  // ── Combo chart: Total Impressions + Est New ────────────────────────
  var comboCard=makeCard(p.bar);
  comboCard.style.marginBottom="14px";
  comboCard.innerHTML='<div class="card-title">Total Impressions vs. Estimated New Page Impressions</div>'+
    '<div class="card-note">"Pages with first impressions (estimated)" — new pages surfacing in search for the first time. '+
    '<span style="color:'+p.s+'">━ Area</span> = total impressions (left axis) &nbsp;|&nbsp; '+
    '<span style="color:'+p.bar+'">█ Bars</span> = estimated new (right axis)</div>';
  var comboCanvas=makeCanvas(wrap.scrollWidth||900,230);
  comboCard.appendChild(comboCanvas);
  wrap.appendChild(comboCard);

  // ── Grid 2: Clicks | CTR ───────────────────────────────────────────
  var grid2=document.createElement("div");
  grid2.className="grid2";

  var clickCard=makeCard(p.p);
  clickCard.innerHTML='<div class="card-title">Clicks Over Time</div>';
  var clickCanvas=makeCanvas(400,180);
  clickCard.appendChild(clickCanvas);
  grid2.appendChild(clickCard);

  var ctrCard=makeCard(p.ctr);
  ctrCard.innerHTML='<div class="card-title">CTR % Over Time</div><div class="card-note">Clicks ÷ Total Impressions</div>';
  var ctrCanvas=makeCanvas(400,180);
  ctrCard.appendChild(ctrCanvas);
  grid2.appendChild(ctrCard);
  wrap.appendChild(grid2);

  // ── Grid 3: Devices | Queries | Countries ─────────────────────────
  var grid3=document.createElement("div");
  grid3.className="grid3";

  // Devices
  var devCard=makeCard(p.p);
  devCard.innerHTML='<div class="card-title">Clicks by Device</div>';
  var devCanvas=makeCanvas(280,180);
  devCard.appendChild(devCanvas);
  grid3.appendChild(devCard);

  // Top Queries
  var latest=months[months.length-1];
  var qCard=makeCard(p.p);
  qCard.innerHTML='<div class="card-title">Top Queries · '+latest.month+'</div>';
  var maxQ=latest.topQueries[0]?latest.topQueries[0].c:1;
  latest.topQueries.forEach(function(q){
    qCard.innerHTML+='<div class="mini-bar-row">'+
      '<div class="mini-bar-label">'+
        '<span class="mini-bar-text">'+q.q+'</span>'+
        '<span class="mini-bar-val" style="color:'+p.p+'">'+q.c.toLocaleString()+'</span>'+
      '</div>'+
      '<div class="mini-bar-track"><div class="mini-bar-fill" style="width:'+Math.round((q.c/maxQ)*100)+'%;background:linear-gradient(90deg,'+p.p+','+p.s+')"></div></div>'+
    '</div>';
  });
  grid3.appendChild(qCard);

  // Top Countries
  var coCard=makeCard(p.ctr);
  coCard.innerHTML='<div class="card-title">Top Countries · '+latest.month+'</div>';
  var maxC=latest.topCountries[0]?latest.topCountries[0].c:1;
  latest.topCountries.forEach(function(c){
    coCard.innerHTML+='<div class="mini-bar-row">'+
      '<div class="mini-bar-label">'+
        '<span class="mini-bar-text">'+c.co+'</span>'+
        '<span class="mini-bar-val" style="color:'+p.ctr+'">'+c.c.toLocaleString()+'</span>'+
      '</div>'+
      '<div class="mini-bar-track"><div class="mini-bar-fill" style="width:'+Math.round((c.c/maxC)*100)+'%;background:linear-gradient(90deg,'+p.ctr+','+p.p+')"></div></div>'+
    '</div>';
  });
  grid3.appendChild(coCard);
  wrap.appendChild(grid3);

  body.appendChild(wrap);

  // ── Draw charts (after DOM inserted so we can measure widths) ──────
  requestAnimationFrame(function(){
    // combo
    var comboW=comboCard.clientWidth-40;
    comboCanvas.style.width=comboW+"px";
    var dpr=window.devicePixelRatio||1;
    comboCanvas.width=comboW*dpr; comboCanvas.height=230*dpr;
    comboCanvas.getContext("2d").scale(dpr,dpr);
    drawComboChart(comboCanvas,months,p.s,p.bar);

    // clicks
    var cw=clickCard.clientWidth-40;
    clickCanvas.style.width=cw+"px";
    clickCanvas.width=cw*dpr; clickCanvas.height=180*dpr;
    clickCanvas.getContext("2d").scale(dpr,dpr);
    drawLineChart(clickCanvas,months.map(function(m){return{label:m.shortLabel,v:m.clicks};}),p.p);

    // ctr
    ctrCanvas.style.width=cw+"px";
    ctrCanvas.width=cw*dpr; ctrCanvas.height=180*dpr;
    ctrCanvas.getContext("2d").scale(dpr,dpr);
    drawLineChart(ctrCanvas,months.map(function(m){return{label:m.shortLabel,v:m.ctr};}),p.ctr,function(v){return v.toFixed(1)+"%";});

    // devices
    var dw=devCard.clientWidth-40;
    devCanvas.style.width=dw+"px";
    devCanvas.width=dw*dpr; devCanvas.height=180*dpr;
    devCanvas.getContext("2d").scale(dpr,dpr);
    drawGroupedBar(devCanvas,
      months.map(function(m){return{label:m.shortLabel,values:[m.desktop,m.mobile,m.tablet]};}),
      [p.p,p.s,p.ctr]
    );

    // legend for devices
    var leg=document.createElement("div");
    leg.style.display="flex";leg.style.gap="12px";leg.style.marginTop="6px";leg.style.fontSize="10px";leg.style.color="#718096";
    [["Desktop",p.p],["Mobile",p.s],["Tablet",p.ctr]].forEach(function(l){
      leg.innerHTML+='<span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+l[1]+';margin-right:4px;vertical-align:middle"></span>'+l[0]+'</span>';
    });
    devCard.appendChild(leg);
  });
}

function render(){
  renderHeader();
  renderDomain();
}

// ════════════════════════════════════════════════════════════════════════
// Gmail OAuth + parsing
// ════════════════════════════════════════════════════════════════════════
var tokenClient=null;

function loadGIS(cb){
  if(window.google&&window.google.accounts){cb();return;}
  var s=document.createElement("script");
  s.src="https://accounts.google.com/gsi/client";
  s.async=true; s.onload=cb;
  document.head.appendChild(s);
}

function doSignIn(cb){
  loadGIS(function(){
    if(!tokenClient){
      tokenClient=window.google.accounts.oauth2.initTokenClient({
        client_id:GOOGLE_CLIENT_ID,scope:GMAIL_SCOPE,callback:function(){}
      });
    }
    tokenClient.callback=function(resp){
      if(resp.error){cb(new Error(resp.error));return;}
      state.token=resp.access_token;
      cb(null);
    };
    tokenClient.requestAccessToken({prompt:""});
  });
}

function gmailGet(path,cb){
  fetch("https://gmail.googleapis.com/gmail/v1/users/me/"+path,{
    headers:{Authorization:"Bearer "+state.token}
  }).then(function(r){return r.json();}).then(function(d){cb(null,d);}).catch(cb);
}

function b64d(s){try{return atob(s.replace(/-/g,"+").replace(/_/g,"/"));}catch(e){return "";}}

function extractText(payload){
  if(!payload) return "";
  if(payload.body&&payload.body.data) return b64d(payload.body.data);
  if(payload.parts){
    for(var i=0;i<payload.parts.length;i++){
      if(payload.parts[i].mimeType==="text/plain"&&payload.parts[i].body&&payload.parts[i].body.data)
        return b64d(payload.parts[i].body.data);
    }
    for(var i=0;i<payload.parts.length;i++){var t=extractText(payload.parts[i]);if(t)return t;}
  }
  return "";
}

function pn(s){
  if(!s)return 0;s=String(s).replace(/,/g,"").trim();
  if(s.endsWith("K"))return parseFloat(s)*1000;
  if(s.endsWith("M"))return parseFloat(s)*1000000;
  return parseFloat(s)||0;
}

function parseMessage(msg){
  var headers=msg.payload&&msg.payload.headers||[];
  var subj=headers.find(function(h){return h.name==="Subject";})||{};
  var dateH=headers.find(function(h){return h.name==="Date";})||{};
  var m=(subj.value||"").match(/Your (\w+) Search performance for (.+)/i);
  if(!m)return null;
  var body=extractText(msg.payload);
  var dateObj=new Date(dateH.value||0);
  var mn=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var clicks=pn((body.match(/([\d.,]+K?)\s*\n?\s*Clicks \(web\)/i)||[])[1]);
  var imps=pn((body.match(/([\d.,]+K?)\s*\n?\s*Impressions \(web\)/i)||[])[1]);
  var pages=pn((body.match(/([\d.,]+)\s*\n?\s*Pages with\s*\n?\s*first impressions/i)||[])[1]);
  var dev=(body.match(/Desktop\s+Mobile\s+Tablet\s+([\d.,]+K?)\s+([\d.,]+K?)\s+([\d.,]+K?)/i)||[]);
  var tq=[],qs=body.match(/Top performing queries[\s\S]*?(?=Full report|Learn about)/i);
  if(qs){var ll=qs[0].split("\n").filter(function(x){return x.trim();});for(var i=0;i<ll.length-1;i++){var q=ll[i].trim(),c=ll[i+1].trim();if(q&&/^\d/.test(c)&&!q.includes("Query")&&!q.includes("Full"))tq.push({q:q,c:pn(c)});}}
  var tc=[],cs=body.match(/Top countries[\s\S]*?(?=Full report|Google search type)/i);
  if(cs){var ll=cs[0].split("\n").filter(function(x){return x.trim();});for(var i=0;i<ll.length-1;i++){var co=ll[i].trim(),ck=ll[i+1].trim();if(co&&/^\d/.test(ck)&&co.length>2&&!co.includes("country")&&!co.includes("Full"))tc.push({co:co,c:pn(ck)});}}
  return{month:m[1],shortLabel:mn[dateObj.getMonth()]+" '"+(dateObj.getFullYear().toString().slice(2)),
    domain:m[2].trim(),date:dateObj,clicks:clicks,impressions:imps,pages:pages,
    ctr:clicks&&imps?((clicks/imps)*100):0,
    desktop:dev[1]?pn(dev[1]):0,mobile:dev[2]?pn(dev[2]):0,tablet:dev[3]?pn(dev[3]):0,
    topQueries:tq.slice(0,3),topCountries:tc.slice(0,3)};
}

function syncGmail(){
  state.loading=true; state.status="syncing"; render();
  // search for all GSC emails
  gmailGet('messages?q=from:sc-noreply@google.com+subject:"Search+performance"&maxResults=50',function(err,res){
    if(err||!res.messages){state.loading=false;state.status="cached";render();return;}
    var msgs=res.messages;
    var fetched=0,parsed=[];
    msgs.forEach(function(m){
      gmailGet('messages/'+m.id+'?format=full',function(err2,full){
        fetched++;
        if(!err2&&full){var p=parseMessage(full);if(p)parsed.push(p);}
        if(fetched===msgs.length){
          if(parsed.length>0){
            var by={};
            parsed.forEach(function(d){if(!by[d.domain])by[d.domain]=[];by[d.domain].push(d);});
            Object.keys(by).forEach(function(domain){by[domain].sort(function(a,b){return a.date-b.date;});});
            state.data=by;
            if(!by[state.domain])state.domain=Object.keys(by)[0];
          }
          state.loading=false; state.status="live"; state.lastSync=new Date(); render();
        }
      });
    });
  });
}

// ════════════════════════════════════════════════════════════════════════
function openModal(){
  var configured=GOOGLE_CLIENT_ID!=="YOUR_CLIENT_ID.apps.googleusercontent.com";
  var mb=document.getElementById("modal-body");
  if(!configured){
    mb.innerHTML='<p style="color:#a0aec0;font-size:13px;line-height:1.7;margin-bottom:16px">To enable live Gmail sync, add your Google OAuth Client ID to the <code style="background:rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;font-size:12px">GOOGLE_CLIENT_ID</code> variable at the top of <code style="background:rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;font-size:12px">index.html</code>.</p>'+
    '<div style="background:rgba(246,173,85,.08);border:1px solid rgba(246,173,85,.2);border-radius:10px;padding:14px 16px">'+
    '<p style="color:#f6ad55;font-weight:700;font-size:12px;margin-bottom:8px">Quick setup:</p>'+
    '<ol><li>Go to <a href="https://console.cloud.google.com" target="_blank">console.cloud.google.com</a></li>'+
    '<li>APIs &amp; Services → Library → enable <strong>Gmail API</strong></li>'+
    '<li>Credentials → Create <strong>OAuth 2.0 Client ID</strong></li>'+
    '<li>App type: <strong>Web application</strong></li>'+
    '<li>Authorised JavaScript origins: your GitHub Pages URL<br><em style="color:#4a5568">e.g. https://yourusername.github.io</em></li>'+
    '<li>Copy the Client ID → paste into <code>index.html</code> → re-upload to GitHub</li></ol></div>';
  } else {
    mb.innerHTML='<p style="color:#a0aec0;font-size:13px;line-height:1.7;margin-bottom:4px">Sign in with Google to pull your latest Search Console emails from Gmail. Read-only — no emails are modified.</p>'+
    '<div id="auth-err" style="color:#fc8181;font-size:12px;margin-bottom:8px;display:none"></div>';
    var btn=document.createElement("button");
    btn.className="google-btn";
    btn.innerHTML='<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Sign in with Google';
    btn.onclick=function(){
      btn.disabled=true; btn.textContent="Signing in…";
      doSignIn(function(err){
        if(err){
          var ae=document.getElementById("auth-err");
          if(ae){ae.style.display="block";ae.textContent="⚠ "+err.message;}
          btn.disabled=false; btn.textContent="Try again";
          return;
        }
        closeModal();
        syncGmail();
      });
    };
    mb.appendChild(btn);
  }
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}
document.getElementById("modal").addEventListener("click",function(e){
  if(e.target===this) closeModal();
});

render();
