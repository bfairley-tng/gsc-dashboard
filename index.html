// ─── Palette ───────────────────────────────────────────────────────────────────
const PAL = {
  "opimian.ca":          {p:"#63b3ed",s:"#9f7aea",bar:"#f6ad55",ctr:"#68d391",flag:"🍷"},
  "narrative-group.com": {p:"#f687b3",s:"#76e4f7",bar:"#fbd38d",ctr:"#9f7aea",flag:"💼"},
};
const pal = d => PAL[d] || {p:"#63b3ed",s:"#9f7aea",bar:"#f6ad55",ctr:"#68d391",flag:"🌐"};

// ─── Gmail helpers ─────────────────────────────────────────────────────────────
function b64decode(s){try{return atob(s.replace(/-/g,"+").replace(/_/g,"/"))}catch(e){return ""}}
function extractBody(payload){
  if(!payload) return "";
  if(payload.body?.data) return b64decode(payload.body.data);
  if(payload.parts){
    for(const p of payload.parts) if(p.mimeType==="text/plain"&&p.body?.data) return b64decode(p.body.data);
    for(const p of payload.parts){const s=extractBody(p);if(s)return s;}
  }
  return "";
}
function pn(s){
  if(!s) return 0; s=String(s).replace(/,/g,"").trim();
  if(s.endsWith("K")) return parseFloat(s)*1000;
  if(s.endsWith("M")) return parseFloat(s)*1000000;
  return parseFloat(s)||0;
}
function parseMsg(msg){
  const subj = msg.payload?.headers?.find(h=>h.name==="Subject")?.value||"";
  const dateH = msg.payload?.headers?.find(h=>h.name==="Date")?.value||"";
  const m = subj.match(/Your (\w+) Search performance for (.+)/i);
  if(!m) return null;
  const body=extractBody(msg.payload);
  const mn=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const dateObj=new Date(dateH);
  const clicks=pn(body.match(/([\d.,]+K?)\s*\n?\s*Clicks \(web\)/i)?.[1]);
  const imps=pn(body.match(/([\d.,]+K?)\s*\n?\s*Impressions \(web\)/i)?.[1]);
  const pages=pn(body.match(/([\d.,]+)\s*\n?\s*Pages with\s*\n?\s*first impressions/i)?.[1]);
  const dev=body.match(/Desktop\s+Mobile\s+Tablet\s+([\d.,]+K?)\s+([\d.,]+K?)\s+([\d.,]+K?)/i);
  const tq=[],qs=body.match(/Top performing queries[\s\S]*?(?=Full report|Learn about)/i);
  if(qs){const l=qs[0].split("\n").filter(x=>x.trim());for(let i=0;i<l.length-1;i++){const q=l[i].trim(),c=l[i+1].trim();if(q&&/^\d/.test(c)&&!q.includes("Query")&&!q.includes("Full"))tq.push({query:q,clicks:pn(c)});}}
  const tc=[],cs=body.match(/Top countries[\s\S]*?(?=Full report|Google search type)/i);
  if(cs){const l=cs[0].split("\n").filter(x=>x.trim());for(let i=0;i<l.length-1;i++){const co=l[i].trim(),ck=l[i+1].trim();if(co&&/^\d/.test(ck)&&co.length>2&&!co.includes("country")&&!co.includes("Full"))tc.push({country:co,clicks:pn(ck)});}}
  return{month:m[1],shortLabel:`${mn[dateObj.getMonth()]} '${dateObj.getFullYear().toString().slice(2)}`,domain:m[2].trim(),
    date:dateObj,clicks,impressions:imps,pages,ctr:clicks&&imps?((clicks/imps)*100).toFixed(2):"0",
    desktop:dev?pn(dev[1]):0,mobile:dev?pn(dev[2]):0,tablet:dev?pn(dev[3]):0,
    topQueries:tq.slice(0,3),topCountries:tc.slice(0,3)};
}

let tokenClient=null, accessToken=null;
function loadGIS(){
  return new Promise(res=>{
    if(window.google){res();return;}
    const s=document.createElement("script");
    s.src="https://accounts.google.com/gsi/client";s.async=true;s.onload=res;document.head.appendChild(s);
  });
}
async function signIn(){
  await loadGIS();
  if(!tokenClient){
    tokenClient=window.google.accounts.oauth2.initTokenClient({client_id:GOOGLE_CLIENT_ID,scope:GMAIL_SCOPE,callback:()=>{}});
  }
  return new Promise((res,rej)=>{
    tokenClient.callback=resp=>resp.error?rej(new Error(resp.error)):(accessToken=resp.access_token,res(resp.access_token));
    tokenClient.requestAccessToken({prompt:accessToken?"":""});
  });
}
async function gFetch(path){
  const r=await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/${path}`,{headers:{Authorization:`Bearer ${accessToken}`}});
  if(!r.ok) throw new Error(`Gmail ${r.status}`);
  return r.json();
}
async function fetchGmail(){
  let msgs=[],pt=null;
  do{
    const url=`messages?q=from:sc-noreply@google.com+subject:"Search+performance"&maxResults=50${pt?`&pageToken=${pt}`:""}`;
    const res=await gFetch(url);
    if(res.messages) msgs=msgs.concat(res.messages);
    pt=res.nextPageToken;
  }while(pt);
  const full=await Promise.all(msgs.map(m=>gFetch(`messages/${m.id}?format=full`)));
  const parsed=full.map(parseMsg).filter(Boolean);
  const by={};
  parsed.forEach(d=>{if(!by[d.domain])by[d.domain]=[];by[d.domain].push(d);});
  Object.values(by).forEach(a=>a.sort((a,b)=>a.date-b.date));
  return by;
}

// ─── Recharts ──────────────────────────────────────────────────────────────────
const {AreaChart,Area,BarChart,Bar,LineChart,Line,ComposedChart,XAxis,YAxis,CartesianGrid,Tooltip,Legend,ResponsiveContainer}=Recharts;

const Tip=({active,payload,label})=>{
  if(!active||!payload?.length) return null;
  return <div style={{background:"rgba(8,10,18,0.97)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 14px",fontSize:12,boxShadow:"0 8px 32px rgba(0,0,0,0.6)"}}>
    <p style={{color:"#a0aec0",fontWeight:700,margin:"0 0 6px",fontSize:11}}>{label}</p>
    {payload.map((p,i)=><p key={i} style={{color:p.color,margin:"3px 0",fontFamily:"'Space Mono',monospace"}}>{p.name}: <strong>{typeof p.value==="number"?p.value.toLocaleString():p.value}</strong></p>)}
  </div>;
};

// ─── UI atoms ──────────────────────────────────────────────────────────────────
function KPI({label,value,sub,color,delta,icon}){
  const up=delta>=0;
  return <div style={{background:"linear-gradient(145deg,rgba(12,16,28,0.95),rgba(16,22,40,0.95))",border:`1px solid ${color}25`,borderRadius:14,padding:"16px 18px",position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",top:-24,right:-24,width:90,height:90,background:`radial-gradient(circle,${color}15 0%,transparent 70%)`,pointerEvents:"none"}}/>
    <div style={{display:"flex",justifyContent:"space-between"}}>
      <p style={{color:"#4a5568",fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",margin:"0 0 8px",fontWeight:700}}>{label}</p>
      {icon&&<span style={{fontSize:14,opacity:0.45}}>{icon}</span>}
    </div>
    <p style={{color,fontSize:22,fontWeight:800,margin:"0 0 2px",fontFamily:"'Space Mono',monospace",lineHeight:1}}>{value}</p>
    {sub&&<p style={{color:"#4a5568",fontSize:10,margin:"3px 0 0"}}>{sub}</p>}
    {delta!==undefined&&<div style={{display:"inline-flex",alignItems:"center",gap:3,color:up?"#68d391":"#fc8181",background:up?"rgba(104,211,145,0.08)":"rgba(252,129,129,0.08)",border:`1px solid ${up?"rgba(104,211,145,0.2)":"rgba(252,129,129,0.2)"}`,borderRadius:20,padding:"1px 7px",fontSize:10,marginTop:6,fontWeight:700}}>
      {up?"↑":"↓"} {Math.abs(delta).toFixed(1)}%
    </div>}
  </div>;
}

const Card=({children,accent="#63b3ed",style={}})=>
  <div style={{background:"rgba(11,14,26,0.92)",border:`1px solid ${accent}18`,borderRadius:14,padding:"18px 20px",boxShadow:"0 2px 20px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.03)",...style}}>{children}</div>;

const SH=({title,note})=>
  <div style={{marginBottom:12}}>
    <p style={{margin:0,fontWeight:700,fontSize:12,color:"#a0aec0"}}>{title}</p>
    {note&&<p style={{margin:"2px 0 0",fontSize:10,color:"#4a5568",lineHeight:1.5}}>{note}</p>}
  </div>;

const MBar=({value,max,color})=>
  <div style={{height:3,borderRadius:2,background:"rgba(255,255,255,0.05)",marginTop:4}}>
    <div style={{height:"100%",borderRadius:2,width:`${Math.round((value/max)*100)}%`,background:color}}/>
  </div>;

// ─── Domain view ───────────────────────────────────────────────────────────────
function DomainView({domain,months}){
  const p=pal(domain);
  const latest=months[months.length-1];
  const prev=months[months.length-2];
  const delta=k=>(!latest||!prev||!prev[k])?undefined:((latest[k]-prev[k])/prev[k])*100;
  const cd=months.map(m=>({month:m.shortLabel,"Total Impressions":m.impressions,"Est. New Impressions":m.pages,Clicks:m.clicks,"CTR %":parseFloat(m.ctr),Desktop:m.desktop,Mobile:m.mobile,Tablet:m.tablet}));
  const niShare=latest&&latest.impressions>0?((latest.pages/latest.impressions)*100).toFixed(1):0;
  const totDev=latest?(latest.mobile+latest.desktop+latest.tablet):1;
  const mobShare=totDev>0?Math.round((latest?.mobile||0)/totDev*100):0;
  const bs=months.length<=4?36:22;

  return <div className="fade-up">
    {/* title */}
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
      <span style={{fontSize:22}}>{p.flag}</span>
      <div>
        <h1 style={{margin:0,fontSize:20,fontWeight:800,color:"#e2e8f0",letterSpacing:"-0.04em"}}>{domain}</h1>
        <p style={{margin:0,color:"#374151",fontSize:11}}>{months.length} month{months.length!==1?"s":""} · {months[0]?.shortLabel} → {latest.shortLabel}</p>
      </div>
    </div>

    {/* KPIs */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:16}}>
      <KPI icon="🖱️" label="Clicks" value={latest.clicks.toLocaleString()} sub={latest.month} color={p.p} delta={delta("clicks")}/>
      <KPI icon="👁️" label="Total Impressions" value={latest.impressions>=1000?(latest.impressions/1000).toFixed(1)+"K":latest.impressions} sub="times shown" color={p.s} delta={delta("impressions")}/>
      <KPI icon="✨" label="Est. New Impressions" value={latest.pages.toLocaleString()} sub={`${niShare}% of total`} color={p.bar} delta={delta("pages")}/>
      <KPI icon="%" label="CTR" value={latest.ctr+"%"} sub="click-through rate" color={p.ctr} delta={delta("ctr")}/>
      <KPI icon="📱" label="Mobile Share" value={mobShare+"%"} sub="of device clicks" color="#fc8181"/>
    </div>

    {/* Impressions spotlight */}
    <Card accent={p.bar} style={{marginBottom:14}}>
      <SH title="Total Impressions vs. Estimated New Page Impressions" note='"Pages with first impressions (estimated)" — new pages surfacing in search for the first time. Bars = right axis.'/>
      <ResponsiveContainer width="100%" height={220}>
        <ComposedChart data={cd} margin={{top:4,right:14,bottom:0,left:0}}>
          <defs>
            <linearGradient id={`ig${domain}`} x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stopColor={p.s} stopOpacity={0.3}/>
              <stop offset="95%" stopColor={p.s} stopOpacity={0.02}/>
            </linearGradient>
          </defs>
          <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)"/>
          <XAxis dataKey="month" tick={{fill:"#4a5568",fontSize:11}} axisLine={false} tickLine={false}/>
          <YAxis yAxisId="left" tick={{fill:p.s,fontSize:11}} axisLine={false} tickLine={false} tickFormatter={v=>v>=1000?(v/1000).toFixed(0)+"K":v}/>
          <YAxis yAxisId="right" orientation="right" tick={{fill:p.bar,fontSize:11}} axisLine={false} tickLine={false}/>
          <Tooltip content={<Tip/>}/>
          <Legend wrapperStyle={{fontSize:11,color:"#718096",paddingTop:8}}/>
          <Area yAxisId="left" type="monotone" dataKey="Total Impressions" stroke={p.s} strokeWidth={2.5} fill={`url(#ig${domain})`} dot={{fill:p.s,r:4,strokeWidth:0}}/>
          <Bar yAxisId="right" dataKey="Est. New Impressions" fill={p.bar} radius={[5,5,0,0]} opacity={0.85} barSize={bs}/>
        </ComposedChart>
      </ResponsiveContainer>
    </Card>

    {/* Clicks + CTR */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
      <Card accent={p.p}>
        <SH title="Clicks Over Time"/>
        <ResponsiveContainer width="100%" height={180}>
          <AreaChart data={cd} margin={{top:4,right:4,bottom:0,left:0}}>
            <defs>
              <linearGradient id={`cg${domain}`} x1="0" y1="0" x2="0" y2="1">
                <stop offset="5%" stopColor={p.p} stopOpacity={0.28}/><stop offset="95%" stopColor={p.p} stopOpacity={0}/>
              </linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)"/>
            <XAxis dataKey="month" tick={{fill:"#4a5568",fontSize:11}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fill:"#4a5568",fontSize:11}} axisLine={false} tickLine={false}/>
            <Tooltip content={<Tip/>}/>
            <Area type="monotone" dataKey="Clicks" stroke={p.p} strokeWidth={2.5} fill={`url(#cg${domain})`} dot={{fill:p.p,r:4,strokeWidth:0}}/>
          </AreaChart>
        </ResponsiveContainer>
      </Card>
      <Card accent={p.ctr}>
        <SH title="CTR % Over Time" note="Clicks ÷ Total Impressions"/>
        <ResponsiveContainer width="100%" height={180}>
          <LineChart data={cd} margin={{top:4,right:4,bottom:0,left:0}}>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)"/>
            <XAxis dataKey="month" tick={{fill:"#4a5568",fontSize:11}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fill:"#4a5568",fontSize:11}} axisLine={false} tickLine={false} tickFormatter={v=>v+"%"}/>
            <Tooltip content={<Tip/>}/>
            <Line type="monotone" dataKey="CTR %" stroke={p.ctr} strokeWidth={2.5} dot={{fill:p.ctr,r:4,strokeWidth:0}}/>
          </LineChart>
        </ResponsiveContainer>
      </Card>
    </div>

    {/* Devices + Queries + Countries */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}}>
      <Card accent={p.p}>
        <SH title="Clicks by Device"/>
        <ResponsiveContainer width="100%" height={180}>
          <BarChart data={cd} barSize={months.length<=4?12:8} margin={{top:4,right:4,bottom:0,left:0}}>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)"/>
            <XAxis dataKey="month" tick={{fill:"#4a5568",fontSize:10}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fill:"#4a5568",fontSize:10}} axisLine={false} tickLine={false}/>
            <Tooltip content={<Tip/>}/>
            <Legend wrapperStyle={{fontSize:10,color:"#718096"}}/>
            <Bar dataKey="Desktop" fill={p.p} radius={[3,3,0,0]}/>
            <Bar dataKey="Mobile" fill={p.s} radius={[3,3,0,0]}/>
            <Bar dataKey="Tablet" fill={p.ctr} radius={[3,3,0,0]}/>
          </BarChart>
        </ResponsiveContainer>
      </Card>
      <Card accent={p.p}>
        <SH title={`Top Queries · ${latest.month}`}/>
        {latest.topQueries.map((q,i)=>
          <div key={i} style={{marginBottom:13}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontSize:11,color:"#a0aec0",fontWeight:500,maxWidth:"70%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{q.query}</span>
              <span style={{fontSize:11,color:p.p,fontFamily:"'Space Mono',monospace",fontWeight:700}}>{q.clicks.toLocaleString()}</span>
            </div>
            <MBar value={q.clicks} max={latest.topQueries[0].clicks} color={`linear-gradient(90deg,${p.p},${p.s})`}/>
          </div>
        )}
      </Card>
      <Card accent={p.ctr}>
        <SH title={`Top Countries · ${latest.month}`}/>
        {latest.topCountries.map((c,i)=>
          <div key={i} style={{marginBottom:13}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontSize:11,color:"#a0aec0",fontWeight:500}}>{c.country}</span>
              <span style={{fontSize:11,color:p.ctr,fontFamily:"'Space Mono',monospace",fontWeight:700}}>{c.clicks.toLocaleString()}</span>
            </div>
            <MBar value={c.clicks} max={latest.topCountries[0].clicks} color={`linear-gradient(90deg,${p.ctr},${p.p})`}/>
          </div>
        )}
      </Card>
    </div>
  </div>;
}

// ─── Google sign-in modal ──────────────────────────────────────────────────────
function GoogleModal({onClose,onSuccess,error}){
  const configured = GOOGLE_CLIENT_ID !== "YOUR_CLIENT_ID.apps.googleusercontent.com";
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,backdropFilter:"blur(6px)"}}>
    <div style={{background:"rgba(12,16,28,0.98)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:32,maxWidth:440,width:"90%",boxShadow:"0 24px 80px rgba(0,0,0,0.8)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#4285F4,#34A853 50%,#EA4335)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"white",fontSize:15}}>G</div>
          <p style={{fontWeight:800,fontSize:15,color:"#e2e8f0",letterSpacing:"-0.02em"}}>Connect Gmail</p>
        </div>
        <button onClick={onClose} style={{color:"#4a5568",fontSize:20,lineHeight:1}}>×</button>
      </div>

      {!configured
        ? <>
          <p style={{color:"#a0aec0",fontSize:13,lineHeight:1.7,marginBottom:16}}>To enable live Gmail sync, add your Google OAuth Client ID to the <code style={{background:"rgba(255,255,255,0.08)",padding:"1px 5px",borderRadius:4,fontSize:12}}>GOOGLE_CLIENT_ID</code> variable at the top of <code style={{background:"rgba(255,255,255,0.08)",padding:"1px 5px",borderRadius:4,fontSize:12}}>index.html</code>.</p>
          <div style={{background:"rgba(246,173,85,0.08)",border:"1px solid rgba(246,173,85,0.2)",borderRadius:10,padding:"14px 16px",fontSize:12,color:"#a0aec0",lineHeight:2}}>
            <p style={{color:"#f6ad55",fontWeight:700,marginBottom:6}}>Quick setup:</p>
            <ol style={{paddingLeft:18}}>
              <li>Go to <a href="https://console.cloud.google.com" target="_blank" style={{color:"#63b3ed"}}>console.cloud.google.com</a></li>
              <li>APIs &amp; Services → Enable <strong>Gmail API</strong></li>
              <li>Credentials → Create <strong>OAuth 2.0 Client ID</strong></li>
              <li>Add your GitHub Pages URL as an authorised origin</li>
              <li>Paste the Client ID into <code>index.html</code></li>
            </ol>
          </div>
        </>
        : <>
          <p style={{color:"#a0aec0",fontSize:13,lineHeight:1.7,marginBottom:20}}>Sign in with Google to sync your latest Search Console emails from Gmail. Read-only access — no emails are modified.</p>
          {error&&<p style={{color:"#fc8181",fontSize:12,marginBottom:12}}>⚠ {error}</p>}
          <button onClick={onSuccess} style={{width:"100%",background:"white",color:"#1a202c",borderRadius:10,padding:"11px 0",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:10,boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}>
            <svg width="18" height="18" viewBox="0 0 48 48">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Sign in with Google
          </button>
        </>
      }
    </div>
  </div>;
}

// ─── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [data,setData]         = React.useState(PRELOADED);
  const [domain,setDomain]     = React.useState("opimian.ca");
  const [loading,setLoading]   = React.useState(false);
  const [status,setStatus]     = React.useState("Cached data");
  const [lastSync,setLastSync] = React.useState(null);
  const [modal,setModal]       = React.useState(false);
  const [authErr,setAuthErr]   = React.useState(null);

  async function handleSync(){
    setAuthErr(null);
    try{
      await signIn();
      setModal(false);
      setLoading(true); setStatus("Fetching Gmail…");
      const fetched=await fetchGmail();
      if(Object.keys(fetched).length>0){
        setData(fetched); setStatus("Live · Gmail synced");
      } else {
        setStatus("No new emails found");
      }
      setLastSync(new Date());
    } catch(e){
      setAuthErr(e.message);
      setStatus("Sync failed");
    }
    setLoading(false);
  }

  const domains=Object.keys(data);
  const months=data[domain]||[];

  return <>
    {modal&&<GoogleModal onClose={()=>setModal(false)} onSuccess={handleSync} error={authErr}/>}

    {/* Header */}
    <div style={{background:"rgba(5,7,13,0.97)",borderBottom:"1px solid rgba(255,255,255,0.05)",padding:"14px 26px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,backdropFilter:"blur(20px)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:30,height:30,borderRadius:7,background:"linear-gradient(135deg,#4285F4,#34A853 50%,#EA4335)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,color:"white",flexShrink:0}}>G</div>
        <div>
          <p style={{margin:0,fontWeight:800,fontSize:14,color:"#e2e8f0",letterSpacing:"-0.03em"}}>Search Console</p>
          <p style={{margin:0,fontSize:9,color:"#374151",letterSpacing:"0.06em",textTransform:"uppercase"}}>
            {lastSync?`Synced ${lastSync.toLocaleTimeString()}`:"Cached data · connect Gmail to refresh"}
          </p>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {domains.map(d=>{
          const p=pal(d),active=d===domain;
          return <button key={d} onClick={()=>setDomain(d)} style={{background:active?`${p.p}18`:"transparent",border:`1px solid ${active?p.p+"55":"rgba(255,255,255,0.07)"}`,color:active?p.p:"#4a5568",borderRadius:8,padding:"5px 13px",fontSize:12,fontWeight:active?700:400,display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:11}}>{p.flag}</span> {d}
          </button>;
        })}
        <div style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:loading?"#f6ad55":"#68d391",background:loading?"rgba(246,173,85,0.08)":"rgba(104,211,145,0.08)",border:`1px solid ${loading?"rgba(246,173,85,0.2)":"rgba(104,211,145,0.2)"}`,borderRadius:20,padding:"3px 9px"}}>
          <span style={{width:5,height:5,borderRadius:"50%",background:loading?"#f6ad55":"#68d391",animation:loading?"pulse 1s infinite":"none"}}/>
          {loading?"Syncing…":status}
        </div>
        <button onClick={()=>setModal(true)} disabled={loading} style={{background:"rgba(99,179,237,0.1)",border:"1px solid rgba(99,179,237,0.25)",color:"#63b3ed",borderRadius:7,padding:"5px 12px",fontSize:11,fontWeight:700}}>
          {lastSync?"↻ Sync":"↻ Connect Gmail"}
        </button>
      </div>
    </div>

    {/* Body */}
    <div style={{padding:"22px 26px",minHeight:"calc(100vh - 59px)",background:"linear-gradient(160deg,#05070d 0%,#080b17 60%,#05070d 100%)"}}>
      {months.length===0
        ? <div style={{textAlign:"center",padding:"100px 0",color:"#374151"}}>No data for {domain}</div>
        : <DomainView key={domain} domain={domain} months={months}/>
      }
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
